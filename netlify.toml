# Netlify-konfiguration för apps/web (Next.js 14, App Router) – monorepo.
# Byggs på Netlify (Linux CI) via GitHub-koppling – INTE lokalt (Windows kan inte
# skapa symlinkar för Next standalone-output utan adminrättigheter).
#
# INTE static export – API-routes + DB körs som serverless functions via plugin.
#
# Env som måste sättas i Netlify (Site settings → Environment) – redan satta via CLI:
#   DATABASE_URL, DIRECT_URL, GEMINI_API_KEY, AI_PROVIDER, GEMINI_MODEL,
#   IFC_SERVICE_URL (Render), STORAGE_DRIVER=blobs

[build]
  base = "apps/web"
  command = "pnpm install --frozen-lockfile=false && pnpm build"
  # publish relativt base (apps/web) → apps/web/.next. Överstyr ev. UI-värde.
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Pluginet sätter rätt publish-katalog (.next) och paketerar serverless functions.
[[plugins]]
  package = "@netlify/plugin-nextjs"
